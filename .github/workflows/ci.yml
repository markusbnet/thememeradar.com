name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Parallel quality gates: lint, unit, and integration all run concurrently.
# E2E and deploy both start after those three pass — they run concurrently too.
# Production smoke tests run after deploy finishes.
# Critical path: ~5 min (parallel gates) + ~5 min (deploy) + ~5 min (smoke) = ~15 min.

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Setup environment variables
        run: |
          cp .env.local.example .env.local
          echo "DYNAMODB_ENDPOINT=http://localhost:8000" >> .env.local
          echo "AWS_REGION=us-east-1" >> .env.local
          echo "AWS_ACCESS_KEY_ID=test" >> .env.local
          echo "AWS_SECRET_ACCESS_KEY=test" >> .env.local
          echo "JWT_SECRET=test-secret-key-for-ci" >> .env.local
          echo "SESSION_COOKIE_NAME=meme_radar_session" >> .env.local
          echo "NEXT_PUBLIC_APP_URL=http://localhost:3000" >> .env.local
          echo "CRON_SECRET=ci-cron-secret" >> .env.local
          echo "REDDIT_CLIENT_ID=ci-reddit-client" >> .env.local
          echo "REDDIT_CLIENT_SECRET=ci-reddit-secret" >> .env.local
          echo "REDDIT_USER_AGENT=MemeRadarCI/1.0" >> .env.local
      - run: npm run lint

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Setup environment variables
        run: |
          cp .env.local.example .env.local
          echo "DYNAMODB_ENDPOINT=http://localhost:8000" >> .env.local
          echo "AWS_REGION=us-east-1" >> .env.local
          echo "AWS_ACCESS_KEY_ID=test" >> .env.local
          echo "AWS_SECRET_ACCESS_KEY=test" >> .env.local
          echo "JWT_SECRET=test-secret-key-for-ci" >> .env.local
          echo "SESSION_COOKIE_NAME=meme_radar_session" >> .env.local
          echo "NEXT_PUBLIC_APP_URL=http://localhost:3000" >> .env.local
          echo "CRON_SECRET=ci-cron-secret" >> .env.local
          echo "REDDIT_CLIENT_ID=ci-reddit-client" >> .env.local
          echo "REDDIT_CLIENT_SECRET=ci-reddit-secret" >> .env.local
          echo "REDDIT_USER_AGENT=MemeRadarCI/1.0" >> .env.local
      - run: sleep 5
      - run: npm run db:init
        name: Initialize DynamoDB tables
      - run: npm run test -- --testPathPattern=tests/unit
        env:
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Setup environment variables
        run: |
          cp .env.local.example .env.local
          echo "DYNAMODB_ENDPOINT=http://localhost:8000" >> .env.local
          echo "AWS_REGION=us-east-1" >> .env.local
          echo "AWS_ACCESS_KEY_ID=test" >> .env.local
          echo "AWS_SECRET_ACCESS_KEY=test" >> .env.local
          echo "JWT_SECRET=test-secret-key-for-ci" >> .env.local
          echo "SESSION_COOKIE_NAME=meme_radar_session" >> .env.local
          echo "NEXT_PUBLIC_APP_URL=http://localhost:3000" >> .env.local
          echo "CRON_SECRET=ci-cron-secret" >> .env.local
          echo "REDDIT_CLIENT_ID=ci-reddit-client" >> .env.local
          echo "REDDIT_CLIENT_SECRET=ci-reddit-secret" >> .env.local
          echo "REDDIT_USER_AGENT=MemeRadarCI/1.0" >> .env.local
      - run: sleep 5
      - run: npm run db:init
        name: Initialize DynamoDB tables
      - run: sleep 2
      - run: aws dynamodb list-tables --endpoint-url http://localhost:8000 --region us-east-1
        name: Verify DynamoDB tables
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
      - run: npm run test -- --testPathPattern=tests/integration --runInBand
        env:
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-test, integration-test]
    services:
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Setup environment variables
        run: |
          cp .env.local.example .env.local
          echo "DYNAMODB_ENDPOINT=http://localhost:8000" >> .env.local
          echo "AWS_REGION=us-east-1" >> .env.local
          echo "AWS_ACCESS_KEY_ID=test" >> .env.local
          echo "AWS_SECRET_ACCESS_KEY=test" >> .env.local
          echo "JWT_SECRET=test-secret-key-for-ci" >> .env.local
          echo "SESSION_COOKIE_NAME=meme_radar_session" >> .env.local
          echo "NEXT_PUBLIC_APP_URL=http://localhost:3000" >> .env.local
          echo "CRON_SECRET=ci-cron-secret" >> .env.local
          echo "REDDIT_CLIENT_ID=ci-reddit-client" >> .env.local
          echo "REDDIT_CLIENT_SECRET=ci-reddit-secret" >> .env.local
          echo "REDDIT_USER_AGENT=MemeRadarCI/1.0" >> .env.local
      - run: sleep 5
      - run: npm run db:init
        name: Initialize DynamoDB tables
      - run: sleep 2
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright (chromium + system deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: npm run build
        name: Build Next.js app
        env:
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
      - run: npm run db:seed
        name: Seed DynamoDB with fixture
        env:
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
      - run: npm run test:smoke
        name: Run boot smoke test
        env:
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          CRON_SECRET: ci-cron-secret
          JWT_SECRET: test-secret-key-for-ci
          REDDIT_CLIENT_ID: ci-reddit-client
          REDDIT_CLIENT_SECRET: ci-reddit-secret
      - run: npm run test:e2e
        name: Run E2E tests
        timeout-minutes: 20
        env:
          CI: true
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          JWT_SECRET: test-secret-key-for-ci
          SESSION_COOKIE_NAME: meme_radar_session
          CRON_SECRET: ci-cron-secret
          REDDIT_CLIENT_ID: ci-reddit-client
          REDDIT_CLIENT_SECRET: ci-reddit-secret
      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [lint, unit-test, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm install --global vercel@latest
        name: Install Vercel CLI
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        name: Pull Vercel environment
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        name: Build for Vercel
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        name: Deploy to Vercel

  production-e2e:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy, e2e-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright (chromium + system deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: sleep 15
        name: Wait for deployment to stabilize
      - run: npx playwright test --config=playwright.production.config.ts
        name: Run smoke tests against production
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: https://thememeradarcom.vercel.app
      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-e2e-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7
